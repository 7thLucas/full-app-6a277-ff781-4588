apiVersion: skaffold/v4beta7
kind: Config
build:
  tagPolicy:
    customTemplate:
      template: "latest"
  local:
    push: true
    useBuildkit: true
    concurrency: 0
  artifacts:
  - image: quantumteknologi/ptkzd21q-4588-development
    context: .
    docker:
      dockerfile: Dockerfile.dev
      cliFlags:
        - "--cache-from=quantumteknologi/ptkzd21q-4588-development:latest"
        - "--build-arg=BUILDKIT_INLINE_CACHE=1"
    sync:
      infer:
        - 'app/**/*'
        - 'src/**/*'
        - 'public/**/*'
        - 'components/**/*'
        - '*.ts'
        - '*.js'
        - 'tsconfig.json'
        - '*.css'
        - '*.json'
        - '*.html'
      auto:
        manual:
        - src: 'package.json'
          dest: '.'
          strip: ''
manifests:
  rawYaml:
    - k8s/*.yaml
deploy:
  kubectl: {}
